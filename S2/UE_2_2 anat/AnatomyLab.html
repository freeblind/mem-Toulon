<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnatomyLab – Révision Anatomie</title>
<style>
:root{--bg:#06101e;--bg2:#0d1928;--bg3:#132135;--border:#1e3554;--accent:#00c8e0;--accent2:#0097aa;--text:#d4e8f4;--muted:#5a7fa0;--success:#00e09a;--error:#ff4d6a;--warn:#ffb340;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}
#app{height:100vh;overflow:hidden;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 13px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.btn:hover{background:rgba(255,255,255,.07);}.btn:active{transform:scale(.97);}.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:rgba(0,200,224,.12);border-color:rgba(0,200,224,.3);color:var(--accent);}.btn-secondary:hover{background:rgba(0,200,224,.2);}
.btn-danger{border-color:var(--error);color:var(--error);}.btn-danger:hover{background:rgba(255,77,106,.12);}
.btn-ghost{border-color:transparent;color:var(--muted);}.btn-ghost:hover{color:var(--text);border-color:var(--border);}
.btn-sm{padding:4px 10px;font-size:12px;}.btn-xs{padding:2px 7px;font-size:11px;border-radius:5px;}.w-full{width:100%;justify-content:center;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
.input:focus{border-color:var(--accent);}.input::placeholder{color:var(--muted);}
.input-sm{padding:3px 7px;font-size:12px;}
.select{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:4px 7px;font-size:12px;outline:none;cursor:pointer;font-family:inherit;}
.select:focus{border-color:var(--accent);}.select option{background:var(--bg2);}
.form-group{margin-bottom:9px;}.label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sem-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.app-header{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:50px;flex-shrink:0;flex-wrap:wrap;}
.header-brand{font-size:17px;font-weight:800;color:var(--accent);white-space:nowrap;line-height:1.3;}
.header-brand em{font-style:normal;font-size:11px;font-weight:500;color:var(--muted);margin-left:4px;}
.header-spacer{flex:1;min-width:6px;}
.header-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.ex-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
.ex-title strong{color:var(--text);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.toast-success{border-color:var(--success);color:var(--success);}#toast.toast-error{border-color:var(--error);color:var(--error);}#toast.toast-warn{border-color:var(--warn);color:var(--warn);}
.home-view{display:flex;flex-direction:column;height:100vh;}
.home-content{flex:1;overflow-y:auto;padding:18px;}
.filter-bar{display:flex;align-items:center;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.sem-filters{display:flex;gap:4px;flex-wrap:wrap;}
.filter-btn{padding:3px 11px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.filter-btn:hover{color:var(--text);}.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
.search-input{background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:4px 13px;font-size:13px;outline:none;width:180px;margin-left:auto;font-family:inherit;}
.search-input:focus{border-color:var(--accent);}
.schema-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.schema-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;}
.schema-card:hover{border-color:var(--accent);box-shadow:0 4px 22px rgba(0,200,224,.14);transform:translateY(-2px);}
.card-img-area{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--bg);}
.card-img{width:100%;height:100%;object-fit:cover;display:block;}
.card-no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:32px;color:var(--border);}
.card-no-img span{font-size:11px;color:var(--muted);}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;opacity:0;transition:opacity .2s;}
.schema-card:hover .card-overlay{opacity:1;}
.overlay-btn{min-width:120px;}
.card-body{padding:10px;}
.card-title{font-weight:600;font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.card-cat{font-size:11px;color:var(--muted);}
.card-markers{font-size:11px;color:var(--muted);margin-left:auto;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-state h3{font-size:17px;margin-bottom:6px;color:var(--text);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:18px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:15px;padding:20px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.modal-header h2{font-size:16px;font-weight:700;}
.btn-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:5px;line-height:1;}
.btn-close:hover{color:var(--text);}
.modal-preview{width:100%;aspect-ratio:16/9;object-fit:contain;border-radius:7px;background:var(--bg);margin-bottom:10px;}
.modal-info{font-size:12px;color:var(--muted);margin-bottom:12px;}
.modal-warn{color:var(--warn);font-size:12px;margin-bottom:10px;padding:7px 11px;background:rgba(255,179,64,.08);border:1px solid rgba(255,179,64,.25);border-radius:7px;}
.modal-modes{display:flex;flex-direction:column;gap:7px;}
.mode-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;width:100%;}
.mode-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(0,200,224,.06);}
.mode-btn:disabled{opacity:.35;cursor:not-allowed;}
.mode-icon{font-size:24px;flex-shrink:0;width:32px;text-align:center;}
.mode-name{font-weight:600;font-size:13px;display:block;}
.mode-desc{font-size:11px;color:var(--muted);margin-top:1px;display:block;}
.editor-view{display:flex;flex-direction:column;height:100vh;}
.editor-layout{display:flex;flex:1;overflow:hidden;}
.editor-main{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:12px;gap:8px;background:var(--bg);}
.editor-sidebar{width:290px;min-width:290px;overflow-y:auto;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.sidebar-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.count-badge{background:var(--accent);color:#000;border-radius:20px;padding:1px 7px;font-size:11px;font-weight:700;}
.empty-hint{font-size:12px;color:var(--muted);line-height:1.6;}
.tool-bar{display:flex;gap:4px;align-items:center;padding:6px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);align-self:stretch;flex-wrap:wrap;}
.tool-btn{padding:4px 8px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;}
.tool-btn:hover{border-color:var(--accent);color:var(--text);}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.tool-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.tool-hint{font-size:11px;color:var(--warn);padding:2px 7px;background:rgba(255,179,64,.1);border:1px solid rgba(255,179,64,.3);border-radius:4px;}
.color-palette{display:flex;gap:3px;align-items:center;flex-wrap:wrap;}
.color-swatch{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.25);}.color-swatch.active{border-color:#fff;transform:scale(1.2);}
.color-swatch.ring{border-color:rgba(255,255,255,.35);}
.upload-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:13px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;min-height:260px;min-width:320px;max-width:560px;width:100%;}
.upload-zone:hover{border-color:var(--accent);background:rgba(0,200,224,.04);}
.upload-icon{font-size:48px;margin-bottom:12px;}
.upload-zone h3{font-size:16px;margin-bottom:6px;}
.upload-zone p{color:var(--muted);font-size:12px;}
.img-wrapper{position:relative;display:inline-block;max-width:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.main-img{display:block;max-width:100%;max-height:calc(100vh - 185px);user-select:none;-webkit-user-drag:none;}
.main-img-ex{display:block;max-width:100%;max-height:calc(100vh - 165px);user-select:none;-webkit-user-drag:none;}
.arrow-canvas{position:absolute;top:0;left:0;pointer-events:none;}
.cursor-pin .main-img,.cursor-pin .main-img-ex{cursor:crosshair;}
.cursor-text-tool .main-img{cursor:text;}
.cursor-draw .main-img{cursor:crosshair;}
.cursor-locate .main-img-ex{cursor:crosshair;}
.marker-pin{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:rgba(6,16,30,.92);border:2px solid;color:#fff;font-size:10px;font-weight:800;font-family:monospace;display:flex;align-items:center;justify-content:center;z-index:10;user-select:none;pointer-events:auto;cursor:default;}
.marker-pin.editable{cursor:grab;}.marker-pin.editable:hover{transform:translate(-50%,-50%) scale(1.2);}.marker-pin.editable:active{cursor:grabbing;}
.marker-pin.selected{outline:3px solid rgba(255,179,64,.9);outline-offset:2px;}
.marker-pin.show-correct{width:32px;height:32px;font-size:14px;z-index:20;}
.tip-handle{position:absolute;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:rgba(6,16,30,.9);border:2px solid var(--warn);cursor:grab;z-index:12;pointer-events:auto;box-shadow:0 0 7px rgba(255,179,64,.6);}
.tip-handle:hover{transform:translate(-50%,-50%) scale(1.3);}
.brace-handle{position:absolute;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:rgba(6,16,30,.9);border:2px solid;cursor:grab;z-index:12;pointer-events:auto;}
.brace-handle:hover{transform:translate(-50%,-50%) scale(1.4);}
.brace-mid{width:14px;height:14px;border-radius:3px;}
.text-annotation{position:absolute;transform:translate(0,-50%);font-weight:600;font-family:'Segoe UI',sans-serif;background:rgba(6,16,30,.65);padding:2px 6px;border-radius:4px;cursor:default;pointer-events:auto;z-index:9;white-space:pre;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.text-annotation.editable{cursor:grab;}.text-annotation.editable:hover{outline:1px dashed var(--warn);outline-offset:2px;}
.text-annotation.selected{outline:2px solid var(--warn);outline-offset:2px;}
.click-indicator{position:absolute;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;z-index:20;pointer-events:none;animation:popIn .2s ease-out;}
.click-ok{background:rgba(0,224,154,.9);border:2px solid var(--success);color:#000;}
.click-ko{background:rgba(255,77,106,.9);border:2px solid var(--error);color:#fff;}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.4);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}
.ml-item{padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s;}
.ml-item:hover{border-color:var(--muted);}.ml-selected{border-color:var(--warn)!important;background:rgba(255,179,64,.03);}
.ml-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.ml-num{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;font-family:monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(0,0,0,.4);border:2px solid;}
.ml-body{flex:1;min-width:0;}
.ml-alias-list{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.ml-alias-row{display:flex;gap:3px;align-items:center;}
.ml-actions{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.exercise-view{display:flex;flex-direction:column;height:100vh;}
.exercise-layout{display:flex;flex:1;overflow:hidden;}
.exercise-img-area{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg);}
.exercise-panel{width:320px;min-width:320px;overflow-y:auto;background:var(--bg2);border-left:1px solid var(--border);padding:15px;display:flex;flex-direction:column;gap:8px;}
.panel-title{font-size:14px;font-weight:700;}
.panel-sub{font-size:12px;color:var(--muted);line-height:1.5;}
.panel-footer{display:flex;gap:6px;flex-wrap:wrap;padding-top:9px;border-top:1px solid var(--border);margin-top:auto;}
.fill-list{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto;}
.fill-row{display:flex;align-items:center;gap:6px;}
.fill-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;font-family:monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(0,0,0,.35);border:2px solid;}
.reveal-list{display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;}
.reveal-row{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;}
.reveal-row:hover{border-color:var(--muted);}
.reveal-num{width:21px;height:21px;border-radius:50%;font-size:10px;font-weight:700;font-family:monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(0,0,0,.35);border:2px solid;}
.reveal-body{flex:1;min-width:0;}
.reveal-label{font-size:13px;font-weight:600;transition:filter .35s;word-break:break-word;}
.reveal-aliases{font-size:11px;color:var(--muted);margin-top:1px;transition:filter .35s;}
.blurred{filter:blur(5px);user-select:none;}
.reveal-icon{font-size:14px;flex-shrink:0;opacity:.5;}
.locate-panel{width:265px;min-width:265px;padding:15px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.locate-target{font-size:18px;font-weight:800;color:var(--accent);padding:13px;background:rgba(0,200,224,.08);border:1px solid rgba(0,200,224,.25);border-radius:var(--radius);text-align:center;line-height:1.3;word-break:break-word;}
.locate-pb{height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.locate-fill{height:100%;background:var(--accent);transition:width .3s;border-radius:3px;}
.locate-ptext{font-size:11px;color:var(--muted);text-align:center;}
.locate-history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.hist-item{font-size:11px;padding:3px 7px;border-radius:4px;}
.hist-item.ok{color:var(--success);background:rgba(0,224,154,.07);}
.hist-item.ko{color:var(--error);background:rgba(255,77,106,.07);}
.score-view{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;overflow-y:auto;}
.score-card{border:2px solid;border-radius:14px;padding:28px;text-align:center;max-width:440px;width:100%;background:var(--bg2);}
.score-big{font-size:40px;font-weight:800;font-family:monospace;}
.score-pct{font-size:18px;font-weight:600;}
.score-msg{font-size:13px;margin-top:4px;}
.score-det{display:flex;flex-direction:column;gap:3px;margin:16px 0;text-align:left;max-height:260px;overflow-y:auto;}
.score-det-row{display:flex;align-items:flex-start;gap:6px;padding:5px 9px;border-radius:6px;font-size:12px;}
.score-det-row.ok{background:rgba(0,224,154,.07);color:var(--success);}
.score-det-row.ko{background:rgba(255,77,106,.07);color:var(--error);}
.score-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.tolerance-info{font-size:11px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 8px;line-height:1.5;}
.tolerance-info strong{color:var(--accent);}
/* draw tool options bar */
.draw-opts{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:5px 9px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;align-self:stretch;}
.draw-opts label{font-size:10px;color:var(--muted);}

</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="img-upload" accept="image/*" style="display:none">
<input type="file" id="json-import" accept=".json" style="display:none">
<div id="toast"></div>
<textarea id="__edata" style="display:none"></textarea>
<script>

'use strict';

/* ══ CONSTANTS ══ */
const STORAGE_KEY='anatomylab_v5';
const HIT_RADIUS=0.065;
const SEMESTERS=['S1','S2','S3','S4','S5','S6','Autre'];
const SEM_COLORS={S1:'#8b5cf6',S2:'#00c8e0',S3:'#00e09a',S4:'#ffb340',S5:'#f97316',S6:'#ec4899',Autre:'#6366f1'};
const PIN_COLORS=['#00c8e0','#00e09a','#ff4d6a','#ffb340','#f97316','#ec4899','#8b5cf6','#a78bfa','#fde68a','#60a5fa','#6ee7b7','#fca5a5','#ffffff','#cccccc','#888888','#444444','#222222','#000000'];
const TEXT_COLORS=['#ffffff','#fde68a','#00e09a','#ff4d6a','#00c8e0','#ec4899','#ffb340','#000000'];
const BG_PRESETS=['transparent','#ffffff','#f8f6f0','#e8e8e8','#1a1a2e','#0d1928','#000000'];
const BRACE_COLORS=['#00c8e0','#00e09a','#ffb340','#ff4d6a','#ec4899','#ffffff','#000000'];
const ALL_COLORS=['#00c8e0','#00e09a','#ff4d6a','#ffb340','#f97316','#ec4899','#8b5cf6','#ffffff','#000000','#888888'];
const DRAW_TOOLS=['line','freehand','circle','cross'];
const TOOL_ICONS={line:'—',freehand:'✏️',circle:'○',cross:'✕',brace:'⌐',pin:'📍',text:'T',select:'↖'};
function needsRing(c){return['#ffffff','#cccccc','#fde68a','#f8f6f0','#e8e8e8'].includes(c);}

/* ══ CAPTURE CLEAN SOURCE before any rendering ══ */
// _ORIG_SRC removed - export now uses document.scripts directly

/* ══ STATE ══ */
let S={
  schemas:[],view:'home',editorId:null,exerciseSchemaId:null,exerciseModalOpen:false,
  filter:{semester:'all',search:''},
  editor:{
    tool:'select',
    selectedMarkerId:null,selectedTextId:null,selectedBraceId:null,
    activeColor:PIN_COLORS[0],activeTextColor:TEXT_COLORS[0],activeBraceColor:BRACE_COLORS[0],
    /* draw tool state */
    drawColor:'#ff4d6a',drawWidth:2,drawDash:'',
    drawDraft:null,   // live preview data while dragging
    drawPoints:[],    // for freehand
    drawStart:null,   // {x,y} for line/circle
  },
  ex:{mode:null,schemaId:null,groups:[],answers:{},submitted:false,score:null,
      revealed:{},locateQueue:[],locateIdx:0,locateResults:[],locateDone:false,
      feedback:null,feedbackTimeout:null},
};

/* ══ UTILS ══ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-_'`]/g,' ').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();}
function isCorrect(ans,marker){
  const n=norm(ans);if(!n)return false;
  const ns=normNoSp(ans);
  const all=[marker.label,...(marker.aliases||[])].filter(l=>l&&l.trim());
  return all.some(l=>{
    const ln=norm(l);
    if(ln===n)return true;               // exact match (with spaces)
    if(normNoSp(l)===ns)return true;     // match ignoring spaces (subclavière = sub clavière)
    return false;
  });
}
function normNoSp(s){ return norm(s).replace(/\s/g,''); }

function getSemColor(s){return SEM_COLORS[s]||'#5a7fa0';}
function pinText(bg){const h=(bg||'').replace('#','');if(h.length!==6)return'#fff';const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return(0.299*r+0.587*g+0.114*b)>160?'#000':'#fff';}
function getDisplayNum(all,m){const seen=[];for(const x of all){if(!seen.includes(x.groupId))seen.push(x.groupId);if(x.id===m.id)return seen.indexOf(m.groupId)+1;}return'?';}
function buildGroups(markers){const map={},order=[];for(const m of markers){if(!m.label.trim())continue;if(!map[m.groupId]){map[m.groupId]={groupId:m.groupId,markers:[],label:m.label,aliases:m.aliases||[]};order.push(m.groupId);}map[m.groupId].markers.push(m);}return order.map(g=>map[g]);}
function showToast(msg,type='info'){const t=document.getElementById('toast');if(!t)return;t.className='show toast-'+type;t.textContent=msg;clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),3200);}
function bgStyle(sc){return 'background:'+(sc&&sc.bgColor&&sc.bgColor!=='transparent'?sc.bgColor:'transparent');}

/* ══ IMAGE COMPRESSION ══ */
function compressImage(file){return new Promise(resolve=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;const MAX=1400;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}const cvs=document.createElement('canvas');cvs.width=w;cvs.height=h;const ctx2=cvs.getContext('2d');const isPng=file.type==='image/png'||file.name?.toLowerCase().endsWith('.png');if(!isPng){ctx2.fillStyle='#fff';ctx2.fillRect(0,0,w,h);}ctx2.drawImage(img,0,0,w,h);URL.revokeObjectURL(url);resolve(isPng?cvs.toDataURL('image/png'):cvs.toDataURL('image/jpeg',0.82));};img.onerror=()=>{URL.revokeObjectURL(url);const r=new FileReader();r.onload=e=>resolve(e.target.result);r.readAsDataURL(file);};img.src=url;});}

/* ══ STORAGE ══ */
function storageInfo(){try{const u=new Blob([localStorage.getItem(STORAGE_KEY)||'']).size;return{u,pct:Math.min(100,Math.round(u/5e6*100))};}catch{return{u:0,pct:0};}}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({schemas:S.schemas}));}catch(e){showToast('⚠️ Stockage plein — exportez !','warn');}}
function load(){
  // 1. Try localStorage
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    S.schemas=(d.schemas||[]).map(migrate);
    console.log('[AnatomyLab] Loaded from localStorage:',S.schemas.length,'schemas');
  }catch(e){S.schemas=[];}
}
// Try to auto-load schema.json (works on HTTP/HTTPS, blocked on file://)
function tryAutoLoad(){
  if(!window.fetch)return;
  const isFileProto=location.protocol==='file:';
  if(isFileProto){
    console.log('[AnatomyLab] file:// protocol — auto-fetch disabled (CORS). Use 📂 Importer JSON or push to GitHub Pages.');
    if(!S.schemas.length)render(); // re-render to show import prompt
    return;
  }
  fetch('./schema.json')
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(d=>{
      if(!d||!d.schemas)throw new Error('Invalid JSON');
      const imported=d.schemas.map(migrate);
      if(!imported.length)return;
      const newOnes=imported.filter(imp=>!S.schemas.some(ex=>ex.title===imp.title&&ex.semester===imp.semester));
      if(!newOnes.length){console.log('[AnatomyLab] schema.json already up to date');return;}
      S.schemas=[...S.schemas,...newOnes];
      save();
      console.log('[AnatomyLab] Auto-loaded schema.json:',newOnes.length,'new schemas');
      showToast('✅ schema.json chargé ('+newOnes.length+' schémas)','success');
      render();
    })
    .catch(e=>console.log('[AnatomyLab] schema.json:',e.message));
}

/* ══ MIGRATION ══ */
function migrate(sc){
  if(!sc.texts)sc.texts=[];if(!sc.braces)sc.braces=[];if(!sc.shapes)sc.shapes=[];if(!sc.bgColor)sc.bgColor='transparent';
  sc.markers.forEach(m=>{
    if(!m.aliases)m.aliases=[];if(!m.color)m.color=PIN_COLORS[0];if(!m.groupId)m.groupId=m.id;
    if(!m.arrows){m.arrows=[];if(m.arrowTip){m.arrows.push({id:uid(),x:m.arrowTip.x,y:m.arrowTip.y,color:m.color,width:2,outline:''});delete m.arrowTip;}}
    m.arrows.forEach(a=>{if(!a.id)a.id=uid();if(!a.color)a.color=m.color;if(!a.width)a.width=2;if(a.outline===undefined)a.outline='';});
  });
  sc.texts.forEach(t=>{if(!t.fontSize)t.fontSize=14;});
  sc.braces.forEach(b=>{if(!b.color)b.color=BRACE_COLORS[0];if(!b.lineWidth)b.lineWidth=2;if(!b.fontSize)b.fontSize=13;if(!b.side)b.side='right';if(b.angle===undefined)b.angle=0;});
  sc.shapes.forEach(sh=>{if(!sh.id)sh.id=uid();if(!sh.color)sh.color='#ff4d6a';if(!sh.lineWidth)sh.lineWidth=2;if(!sh.dash)sh.dash='';});
  return sc;
}

function addMarker(sid,x,y,color){const sc=getSchema(sid);if(!sc)return;const id=uid();const m={id,groupId:id,x,y,label:'',aliases:[],color:color||PIN_COLORS[0],arrows:[]};sc.markers.push(m);save();return m;}

function updateMarker(sid,mid,f){const sc=getSchema(sid);if(!sc)return;const m=sc.markers.find(m=>m.id===mid);if(!m)return;Object.assign(m,f);save();}
function addGroupMarker(sid,srcId){const sc=getSchema(sid);if(!sc)return;const s=sc.markers.find(m=>m.id===srcId);if(!s)return;const m={id:uid(),groupId:s.groupId,x:Math.min(s.x+0.05,0.95),y:Math.min(s.y+0.05,0.95),label:s.label,aliases:[...s.aliases],color:s.color,arrows:[]};sc.markers.push(m);save();return m;}
function addArrow(sid,mid){const sc=getSchema(sid);if(!sc)return;const m=sc.markers.find(m=>m.id===mid);if(!m)return;if(!m.arrows)m.arrows=[];const a={id:uid(),x:Math.min(m.x+0.08,0.95),y:Math.min(m.y+0.08,0.95),color:m.color,width:2,outline:''};m.arrows.push(a);save();return a;}

function addText(sid,x,y,color){const sc=getSchema(sid);if(!sc)return;if(!sc.texts)sc.texts=[];const t={id:uid(),x,y,text:'Texte',color:color||TEXT_COLORS[0],fontSize:14};sc.texts.push(t);save();return t;}

/* ══ DRAWING ══ */
function applyDash(ctx,dash){
  if(dash==='dashed')ctx.setLineDash([10,6]);
  else if(dash==='dotted')ctx.setLineDash([2,6]);
  else ctx.setLineDash([]);
}
function drawArrow(ctx,r,x1n,y1n,x2n,y2n,color,width,outline){
  const x1=x1n*r.width,y1=y1n*r.height,x2=x2n*r.width,y2=y2n*r.height;
  const w=width||2,hs=8+w*1.2,angle=Math.atan2(y2-y1,x2-x1);
  function stroke(col,lw){ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hs*Math.cos(angle-0.38),y2-hs*Math.sin(angle-0.38));ctx.lineTo(x2-hs*Math.cos(angle+0.38),y2-hs*Math.sin(angle+0.38));ctx.closePath();ctx.fill();}
  if(outline)stroke(outline,w+3);stroke(color||'#00c8e0',w);
}
function drawCurlyBrace(ctx,r,br){
  const x=br.x*r.width,y1=br.y1*r.height,y2=br.y2*r.height;
  const h=y2-y1,mid=(y1+y2)/2,d=br.side==='left'?-1:1;
  const arm=Math.max(9,Math.min(22,h*0.14));
  const angle=(br.angle||0)*Math.PI/180;
  ctx.save();
  if(angle){ctx.translate(x,mid);ctx.rotate(angle);ctx.translate(-x,-mid);}
  ctx.strokeStyle=br.color||'#00c8e0';ctx.lineWidth=br.lineWidth||2;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(x,y1);ctx.quadraticCurveTo(x,y1+h*0.25,x+arm*d,y1+h*0.25);ctx.quadraticCurveTo(x+arm*d,mid,x+arm*2*d,mid);ctx.quadraticCurveTo(x+arm*d,mid,x+arm*d,y2-h*0.25);ctx.quadraticCurveTo(x,y2-h*0.25,x,y2);ctx.stroke();
  if(br.label){ctx.font='600 '+(br.fontSize||13)+'px \'Segoe UI\',sans-serif';ctx.fillStyle=br.color||'#00c8e0';ctx.textAlign=d>0?'left':'right';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.75)';ctx.shadowBlur=3;ctx.fillText(br.label,x+arm*2.6*d,mid);ctx.shadowBlur=0;}
  ctx.restore();
}
function drawShape(ctx,r,sh){
  ctx.save();
  ctx.strokeStyle=sh.color||'#ff4d6a';ctx.lineWidth=sh.lineWidth||2;ctx.lineCap='round';ctx.lineJoin='round';
  applyDash(ctx,sh.dash);
  if(sh.type==='line'){
    ctx.beginPath();ctx.moveTo(sh.x1*r.width,sh.y1*r.height);ctx.lineTo(sh.x2*r.width,sh.y2*r.height);ctx.stroke();
  } else if(sh.type==='freehand'){
    if(!sh.pts||sh.pts.length<2){ctx.restore();return;}
    ctx.beginPath();ctx.moveTo(sh.pts[0].x*r.width,sh.pts[0].y*r.height);
    for(let i=1;i<sh.pts.length;i++)ctx.lineTo(sh.pts[i].x*r.width,sh.pts[i].y*r.height);
    ctx.stroke();
  } else if(sh.type==='circle'){
    ctx.beginPath();ctx.ellipse(sh.cx*r.width,sh.cy*r.height,sh.rx*r.width,sh.ry*r.height,0,0,Math.PI*2);ctx.stroke();
  } else if(sh.type==='cross'){
    const s=(sh.size||0.03)*Math.min(r.width,r.height);
    const cx=sh.x*r.width,cy=sh.y*r.height;
    ctx.beginPath();ctx.moveTo(cx-s,cy-s);ctx.lineTo(cx+s,cy+s);ctx.moveTo(cx+s,cy-s);ctx.lineTo(cx-s,cy+s);ctx.stroke();
  }
  ctx.setLineDash([]);ctx.restore();
}
function drawTexts(ctx,r,texts){(texts||[]).forEach(t=>{ctx.font='600 '+(t.fontSize||14)+'px \'Segoe UI\',sans-serif';ctx.fillStyle=t.color||'#fff';ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=3;ctx.fillText(t.text,t.x*r.width,t.y*r.height);ctx.shadowBlur=0;});}
function drawAll(sc,imgEl,canvasEl,exMode){
  if(!canvasEl||!imgEl)return;
  const r=imgEl.getBoundingClientRect();
  canvasEl.width=r.width;canvasEl.height=r.height;
  const ctx=canvasEl.getContext('2d');ctx.clearRect(0,0,r.width,r.height);
  const markers=exMode?sc.markers.filter(m=>m.label.trim()):sc.markers;
  markers.forEach(m=>(m.arrows||[]).forEach(a=>drawArrow(ctx,r,m.x,m.y,a.x,a.y,a.color,a.width,a.outline)));
  (sc.braces||[]).forEach(b=>drawCurlyBrace(ctx,r,b));
  (sc.shapes||[]).forEach(sh=>drawShape(ctx,r,sh));
  drawTexts(ctx,r,sc.texts);
}
function redrawCanvas(){const sc=getSchema(S.editorId);if(!sc)return;drawAll(sc,document.getElementById('main-img'),document.getElementById('arrow-canvas'),false);}

      <div style="height:4px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${si.pct}%;background:${bc};border-radius:3px"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;line-height:1.7">${location.protocol==='file:'?`<span style='color:var(--warn)'>⚠️ <b>Mode local (file://)</b></span> — Chrome bloque le chargement automatique. Utilisez <b>📂 Importer JSON</b> ci-dessus ou glissez votre fichier .json ici. Vos schémas sont mémorisés automatiquement après import.`:`✅ <b>Chargement auto actif</b> — placez <code>schema.json</code> dans le même dossier, il sera chargé automatiquement.`}</div>
    </div>
    <div class="filter-bar">
      <div class="sem-filters">
        <div class="filter-btn ${semester==='all'?'active':''}" data-sem="all">Tous</div>
        ${SEMESTERS.map(s=>`<div class="filter-btn ${semester===s?'active':''}" data-sem="${s}" style="${semester===s?'background:'+getSemColor(s)+';border-color:'+getSemColor(s)+';color:#000':''}">${s}</div>`).join('')}
      </div>
      <input class="search-input" id="s-inp" placeholder="🔍 Rechercher…" value="${search}">
    </div>
    ${list.length===0?`<div class="empty-state"><div class="empty-icon">${S.schemas.length===0?'🫁':'🔍'}</div><h3>${S.schemas.length===0?'Aucun schéma — commencez !':'Aucun résultat'}</h3>${S.schemas.length===0?`<div style='margin:18px auto;max-width:340px'><button class='btn btn-primary w-full' id='btn-import-big' style='font-size:16px;padding:14px;border-radius:12px;gap:10px'>📂 Importer votre fichier JSON</button><div style='font-size:11px;color:var(--muted);margin-top:10px'>ou glissez-déposez votre <code>.json</code> n'importe où sur cette page</div></div>`:''}</div>`
    :`<div class="schema-grid">${list.map(sc=>`<div class="schema-card"><div class="card-img-area" style="${sc.bgColor&&sc.bgColor!=='transparent'?'background:'+sc.bgColor:''}">
      ${sc.imageData?`<img class="card-img" src="${sc.imageData}" alt="">`:`<div class="card-no-img">🖼️<span>Pas d'image</span></div>`}
      <div class="card-overlay">
        <button class="btn btn-primary overlay-btn btn-sm" data-action="exercise" data-id="${sc.id}">▶ Exercice</button>
        <button class="btn overlay-btn btn-sm" data-action="edit" data-id="${sc.id}">✏️ Éditer</button>
        <button class="btn btn-danger overlay-btn btn-xs" data-action="delete" data-id="${sc.id}">🗑️ Supprimer</button>
      </div></div>
      <div class="card-body"><div class="card-title">${sc.title||'Sans titre'}</div>
      <div class="card-meta"><span class="sem-badge" style="background:${getSemColor(sc.semester)};color:#000">${sc.semester||'?'}</span>
      ${sc.category?`<span class="card-cat">${sc.category}</span>`:''}
      <span class="card-markers">${sc.markers.length} marq.</span>
      </div></div></div>`).join('')}</div>`}
  </div>
</div>`;
  document.getElementById('btn-new').onclick=()=>{const sc=createSchema();S.editorId=sc.id;S.view='editor';render();};
  const bigImport=document.getElementById('btn-import-big');
  if(bigImport)bigImport.onclick=()=>document.getElementById('json-import').click();
  // Drag-drop JSON onto home page
  const homeContent=document.getElementById('home-content');
  if(homeContent){
    homeContent.ondragover=e=>{e.preventDefault();homeContent.style.outline='2px dashed var(--accent)';};
    homeContent.ondragleave=()=>{homeContent.style.outline='';};
    homeContent.ondrop=e=>{
      e.preventDefault();homeContent.style.outline='';
      const f=e.dataTransfer.files[0];
      if(f&&(f.name.endsWith('.json')||f.type==='application/json'))importJSON(f);
      else showToast('⚠️ Glissez un fichier .json','warn');
    };
  }
  document.getElementById('btn-save').onclick=exportJSON;
  document.getElementById('btn-import').onclick=()=>document.getElementById('json-import').click();
  document.getElementById('s-inp').oninput=e=>{S.filter.search=e.target.value;render();};
  document.querySelectorAll('[data-sem]').forEach(el=>el.onclick=()=>{S.filter.semester=el.dataset.sem;render();});
  document.querySelectorAll('[data-action="edit"]').forEach(el=>el.onclick=e=>{e.stopPropagation();S.editorId=el.dataset.id;S.view='editor';render();});
  document.querySelectorAll('[data-action="exercise"]').forEach(el=>el.onclick=e=>{e.stopPropagation();openExModal(el.dataset.id);});
  document.querySelectorAll('[data-action="delete"]').forEach(el=>el.onclick=e=>{e.stopPropagation();if(confirm('Supprimer ce schéma ?')){deleteSchema(el.dataset.id);render();}});
  document.getElementById('btn-random').onclick=()=>openRandomModal();
}

/* ══ EXERCISE MODAL ══ */
function openExModal(id){S.exerciseSchemaId=id;S.exerciseModalOpen=true;renderExModal();}
function closeExModal(){S.exerciseModalOpen=false;S.exerciseSchemaId=null;render();}
function renderExModal(){
  const app=document.getElementById('app');const sc=getSchema(S.exerciseSchemaId);
  const hasLabels=sc&&sc.markers.some(m=>m.label.trim());
  if(!document.getElementById('ex-modal-overlay'))app.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="ex-modal-overlay"></div>');
  document.getElementById('ex-modal-overlay').innerHTML=`<div class="modal">
    <div class="modal-header"><h2>${sc?sc.title:'?'}</h2><button class="btn-close" id="modal-close">✕</button></div>
    ${sc&&sc.imageData?`<img class="modal-preview" src="${sc.imageData}" style="${sc.bgColor&&sc.bgColor!=='transparent'?'background:'+sc.bgColor:''}">`:''}
    <div class="modal-info">${sc?sc.markers.length:0} marqueurs · <b>${sc?sc.semester:''}</b>${sc&&sc.category?' · '+sc.category:''}</div>
    ${!sc||!sc.markers.length?`<div class="modal-warn">⚠️ Pas de marqueurs.</div>`:''}
    ${sc&&sc.markers.length&&!hasLabels?`<div class="modal-warn">⚠️ Aucun libellé.</div>`:''}
    <div class="modal-modes">
      <button class="mode-btn" id="mode-fill" ${!hasLabels?'disabled':''}><span class="mode-icon">✍️</span><span><span class="mode-name">Remplir les libellés</span><span class="mode-desc">Tapez le nom de chaque zone (tolérance + alias)</span></span></button>
      <button class="mode-btn" id="mode-reveal" ${!hasLabels?'disabled':''}><span class="mode-icon">👁️</span><span><span class="mode-name">Mémorisation & révélation</span><span class="mode-desc">Mémorisez, puis dévoilez</span></span></button>
      <button class="mode-btn" id="mode-locate" ${!hasLabels?'disabled':''}><span class="mode-icon">🎯</span><span><span class="mode-name">Localiser sur le schéma</span><span class="mode-desc">Cliquez à l'endroit du libellé</span></span></button>
    </div>
  </div>`;
  document.getElementById('modal-close').onclick=closeExModal;
  document.getElementById('ex-modal-overlay').onclick=e=>{if(e.target.id==='ex-modal-overlay')closeExModal();};
  if(hasLabels){document.getElementById('mode-fill').onclick=()=>startEx(S.exerciseSchemaId,'fill');document.getElementById('mode-reveal').onclick=()=>startEx(S.exerciseSchemaId,'reveal');document.getElementById('mode-locate').onclick=()=>startEx(S.exerciseSchemaId,'locate');}
}
function startEx(schemaId,mode){
  S.exerciseModalOpen=false;S.exerciseSchemaId=null;const sc=getSchema(schemaId);if(!sc)return;
  const shuffledGroups=shuffle(buildGroups(sc.markers.filter(m=>m.label.trim()))).map((g,i)=>({...g,displayNum:i+1}));
  S.ex={mode,schemaId,groups:shuffledGroups,answers:{},submitted:false,score:null,revealed:{},
        locateQueue:shuffle(shuffledGroups.map(g=>g.label)),locateIdx:0,locateResults:[],locateDone:false,feedback:null,feedbackTimeout:null,manualCorrect:{}};
  S.view=mode==='fill'?'ex-fill':mode==='reveal'?'ex-reveal':'ex-locate';render();
}

function resetEditor(){S.editor={tool:'select',selectedMarkerId:null,selectedTextId:null,selectedBraceId:null,activeColor:PIN_COLORS[0],activeTextColor:TEXT_COLORS[0],activeBraceColor:BRACE_COLORS[0],drawColor:'#ff4d6a',drawWidth:2,drawDash:'',drawDraft:null,drawPoints:[],drawStart:null};}

function isDrawTool(t){return DRAW_TOOLS.includes(t);}

function drawOptsHtml(ed){
  return `<div class="draw-opts">

}

  document.querySelectorAll('.ml-item[data-bid]').forEach(el=>{el.onclick=e=>{if(['INPUT','SELECT','BUTTON'].includes(e.target.tagName))return;ed.selectedBraceId=el.dataset.bid;ed.selectedMarkerId=null;ed.selectedTextId=null;render();};});

  const clearShapes=document.getElementById('btn-clear-shapes');if(clearShapes)clearShapes.onclick=()=>{if(confirm('Effacer toutes les formes ?')){sc.shapes=[];save();renderEditor(document.getElementById('app'));}};
  document.querySelectorAll('[data-sh-col]').forEach(sel=>{sel.onchange=e=>{e.stopPropagation();updateShape(S.editorId,sel.dataset.shCol,{color:e.target.value});redrawCanvas();};sel.onclick=e=>e.stopPropagation();});
  document.querySelectorAll('[data-sh-dash]').forEach(sel=>{sel.onchange=e=>{e.stopPropagation();updateShape(S.editorId,sel.dataset.shDash,{dash:e.target.value});redrawCanvas();};sel.onclick=e=>e.stopPropagation();});
  document.querySelectorAll('[data-sh-lw]').forEach(rng=>{rng.oninput=e=>{updateShape(S.editorId,rng.dataset.shLw,{lineWidth:parseInt(e.target.value)});const sp=document.getElementById('sh-lw-val-'+rng.dataset.shLw);if(sp)sp.textContent=e.target.value+'px';redrawCanvas();};rng.onclick=e=>e.stopPropagation();});

  document.querySelectorAll('[data-tid-size]').forEach(inp=>{inp.oninput=e=>{updateText(S.editorId,e.target.dataset.tidSize,{fontSize:parseInt(e.target.value)||14});refreshTxt(e.target.dataset.tidSize);};inp.onclick=e=>e.stopPropagation();});

  document.querySelectorAll('.ml-item[data-tid]').forEach(el=>{el.onclick=e=>{if(['INPUT','SELECT','BUTTON'].includes(e.target.tagName))return;ed.selectedTextId=el.dataset.tid;ed.selectedMarkerId=null;ed.selectedBraceId=null;render();};});

  /* Restore sidebar scroll */
  {const sb=document.querySelector('.editor-sidebar');if(sb)sb.scrollTop=_sbScroll;}
  /* ── Image interactions ── */
  const wrapper=document.getElementById('img-wrapper');
  if(wrapper){
    drawAll(sc,document.getElementById('main-img'),document.getElementById('arrow-canvas'),false);

    function getImgPos(e){const img=document.getElementById('main-img');if(!img)return null;const r=img.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height,r};}

    /* Non-draw click */
    wrapper.onclick=e=>{
      if(e.target.closest('.marker-pin')||e.target.closest('.text-annotation')||e.target.closest('.tip-handle')||e.target.closest('.brace-handle')||e.target.dataset.shid)return;
      const pos=getImgPos(e);if(!pos)return;
      if(ed.tool==='pin'){const m=addMarker(S.editorId,pos.x,pos.y,ed.activeColor);ed.selectedMarkerId=m.id;ed.selectedBraceId=null;ed.selectedTextId=null;render();setTimeout(()=>{const el=document.getElementById('lbl-'+m.id);if(el)el.focus();},60);}
      else if(ed.tool==='text'){const t=addText(S.editorId,pos.x,pos.y,ed.activeTextColor);ed.selectedTextId=t.id;ed.selectedMarkerId=null;ed.selectedBraceId=null;render();setTimeout(()=>{const el=document.querySelector('[data-tid-inp="'+t.id+'"]');if(el)el.focus();},60);}
      else if(ed.tool==='cross'){
        addShape(S.editorId,{type:'cross',x:pos.x,y:pos.y,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash,size:0.03});
        render();
      }
      else if(ed.tool==='select'){ed.selectedMarkerId=null;ed.selectedBraceId=null;ed.selectedTextId=null;render();}
    };

    /* Draw tool drag */
    let drawDragging=false;
    wrapper.onmousedown=e=>{
      if(e.target.closest('.marker-pin')||e.target.closest('.tip-handle')||e.target.closest('.brace-handle')||e.target.closest('.text-annotation'))return;
      const pos=getImgPos(e);if(!pos)return;
      if(isDrawTool(ed.tool)&&ed.tool!=='cross'){
        e.preventDefault();
        drawDragging=true;
        ed.drawStart={x:pos.x,y:pos.y};
        if(ed.tool==='freehand'){ed.drawPoints=[{x:pos.x,y:pos.y}];}
      }
      /* Brace */
      if(ed.tool==='brace'){
        e.preventDefault();drawDragging=true;
        ed.drawStart={x:pos.x,y:pos.y};
        ed.drawDraft={type:'brace',x:pos.x,y1:pos.y,y2:pos.y};
      }
    };

    const onMouseMove=e=>{
      if(!drawDragging||!ed.drawStart)return;
      const pos=getImgPos(e);if(!pos)return;
      const img=document.getElementById('main-img');if(!img)return;
      const r=img.getBoundingClientRect();

      redrawCanvas();// redraw saved shapes
      const canvas=document.getElementById('arrow-canvas');if(!canvas)return;
      const ctx=canvas.getContext('2d');

      if(ed.tool==='freehand'){
        // Decimate: only add if moved >3px
        const last=ed.drawPoints[ed.drawPoints.length-1];
        const dx=(pos.x-last.x)*r.width,dy=(pos.y-last.y)*r.height;
        if(Math.sqrt(dx*dx+dy*dy)>3)ed.drawPoints.push({x:pos.x,y:pos.y});
        // Draw preview
        drawShape(ctx,r,{type:'freehand',pts:ed.drawPoints,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});
      } else if(ed.tool==='line'){
        drawShape(ctx,r,{type:'line',x1:ed.drawStart.x,y1:ed.drawStart.y,x2:pos.x,y2:pos.y,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});
      } else if(ed.tool==='circle'){
        const cx=(ed.drawStart.x+pos.x)/2,cy=(ed.drawStart.y+pos.y)/2;
        const rx=Math.abs(pos.x-ed.drawStart.x)/2,ry=Math.abs(pos.y-ed.drawStart.y)/2;
        drawShape(ctx,r,{type:'circle',cx,cy,rx,ry,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});
      } else if(ed.tool==='brace'){
        const y1=Math.min(ed.drawStart.y,pos.y),y2=Math.max(ed.drawStart.y,pos.y);
        drawCurlyBrace(ctx,r,{x:ed.drawStart.x,y1,y2,side:'right',label:'',color:ed.activeBraceColor,lineWidth:2,fontSize:13});
      }
    };
    const onMouseUp=e=>{
      if(!drawDragging){return;}
      drawDragging=false;
      const pos=getImgPos(e);if(!pos){ed.drawStart=null;ed.drawDraft=null;return;}

      if(ed.tool==='freehand'&&ed.drawPoints.length>1){
        addShape(S.editorId,{type:'freehand',pts:[...ed.drawPoints],color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});
        ed.drawPoints=[];render();
      } else if(ed.tool==='line'){
        const dx=Math.abs(pos.x-ed.drawStart.x),dy=Math.abs(pos.y-ed.drawStart.y);
        if(dx>0.005||dy>0.005){addShape(S.editorId,{type:'line',x1:ed.drawStart.x,y1:ed.drawStart.y,x2:pos.x,y2:pos.y,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});render();}
      } else if(ed.tool==='circle'){
        const rx=Math.abs(pos.x-ed.drawStart.x)/2,ry=Math.abs(pos.y-ed.drawStart.y)/2;
        if(rx>0.005||ry>0.005){addShape(S.editorId,{type:'circle',cx:(ed.drawStart.x+pos.x)/2,cy:(ed.drawStart.y+pos.y)/2,rx,ry,color:ed.drawColor,lineWidth:ed.drawWidth,dash:ed.drawDash});render();}
      } else if(ed.tool==='brace'){
        const y1=Math.min(ed.drawStart.y,pos.y),y2=Math.max(ed.drawStart.y,pos.y);
        const img=document.getElementById('main-img');const r=img?img.getBoundingClientRect():{height:500};
        if((y2-y1)*r.height>10){const b=addBrace(S.editorId,ed.drawStart.x,y1,y2,ed.activeBraceColor);ed.selectedBraceId=b.id;render();setTimeout(()=>{const el=document.querySelector('[data-blbl="'+b.id+'"]');if(el)el.focus();},60);}
        else render();
      }
      ed.drawStart=null;ed.drawDraft=null;
    };
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);
    wrapper._cleanupDraw=()=>{document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);};

    /* Marker drag */
    sc.markers.forEach(m=>{
      const pin=document.getElementById('pin-'+m.id);if(!pin)return;
      pin.onclick=e=>{e.stopPropagation();ed.selectedMarkerId=m.id;ed.selectedBraceId=null;ed.selectedTextId=null;highlightPin(m.id);};
      makeDraggable(pin,(nx,ny)=>{m.x=nx;m.y=ny;save();redrawCanvas();},()=>{ed.selectedMarkerId=m.id;ed.selectedBraceId=null;ed.selectedTextId=null;});
    });
    /* Arrow tip drag */
    sc.markers.forEach(m=>(m.arrows||[]).forEach(a=>{const h=document.getElementById('tip-'+a.id);if(!h)return;makeDraggable(h,(nx,ny)=>{a.x=nx;a.y=ny;save();redrawCanvas();},null);}));
    /* Brace drag */
    (sc.braces||[]).forEach(b=>{
      ['top','mid','bot'].forEach(part=>{
        const h=document.getElementById('bh-'+part+'-'+b.id);if(!h)return;
        h.onclick=e=>{e.stopPropagation();ed.selectedBraceId=b.id;ed.selectedMarkerId=null;ed.selectedTextId=null;};
        makeDraggable(h,(nx,ny)=>{
          if(part==='top'){b.y1=Math.min(ny,b.y2-0.02);}
          else if(part==='bot'){b.y2=Math.max(ny,b.y1+0.02);}
          else{const dy=ny-(b.y1+b.y2)/2;b.y1+=dy;b.y2+=dy;b.x=nx;}
          save();redrawCanvas();
          const midH=document.getElementById('bh-mid-'+b.id);if(midH)midH.style.top=(((b.y1+b.y2)/2)*100)+'%';
          const topH=document.getElementById('bh-top-'+b.id);if(topH)topH.style.top=(b.y1*100)+'%';
          const botH=document.getElementById('bh-bot-'+b.id);if(botH)botH.style.top=(b.y2*100)+'%';
          if(part==='mid'){['top','mid','bot'].forEach(p=>{const hh=document.getElementById('bh-'+p+'-'+b.id);if(hh)hh.style.left=(b.x*100)+'%';});}
        },()=>{ed.selectedBraceId=b.id;ed.selectedMarkerId=null;ed.selectedTextId=null;});
      });
    });
    /* Text drag */
    sc.texts.forEach(t=>{const el=document.getElementById('txt-'+t.id);if(!el)return;el.onclick=e=>{e.stopPropagation();ed.selectedTextId=t.id;ed.selectedMarkerId=null;ed.selectedBraceId=null;render();};makeDraggable(el,(nx,ny)=>{t.x=nx;t.y=ny;save();},()=>{ed.selectedTextId=t.id;ed.selectedMarkerId=null;ed.selectedBraceId=null;});});
    /* Shape handles drag */
    (sc.shapes||[]).forEach(sh=>{
      function shHandle(elId,onDrag){
        const h=document.getElementById(elId);if(!h)return;
        makeDraggable(h,(nx,ny)=>{onDrag(nx,ny);save();redrawCanvas();
          // Update handle positions live
          if(sh.type==='circle'){
            const ctr=document.getElementById('sh-ctr-'+sh.id);if(ctr){ctr.style.left=(sh.cx*100)+'%';ctr.style.top=(sh.cy*100)+'%';}
            const rad=document.getElementById('sh-rad-'+sh.id);if(rad){rad.style.left=((sh.cx+sh.rx)*100)+'%';rad.style.top=((sh.cy+sh.ry)*100)+'%';}
          }
        },null);
      }
      if(sh.type==='line'){
        shHandle('sh-p1-'+sh.id,(nx,ny)=>{sh.x1=nx;sh.y1=ny;});
        shHandle('sh-p2-'+sh.id,(nx,ny)=>{sh.x2=nx;sh.y2=ny;});
      } else if(sh.type==='circle'){
        shHandle('sh-ctr-'+sh.id,(nx,ny)=>{const dx=nx-sh.cx,dy=ny-sh.cy;sh.cx=nx;sh.cy=ny;});
        shHandle('sh-rad-'+sh.id,(nx,ny)=>{const img=document.getElementById('main-img');if(!img)return;sh.rx=Math.max(0.005,Math.abs(nx-sh.cx));sh.ry=Math.max(0.005,Math.abs(ny-sh.cy));});
      } else if(sh.type==='cross'){
        shHandle('sh-ctr-'+sh.id,(nx,ny)=>{sh.x=nx;sh.y=ny;});
      }
    });
  }
}

function makeDraggable(el,onMove,onStart){
  let drag=false,sx,sy,smx,smy;
  el.onmousedown=e=>{
    if(S.editor.tool!=='select')return;
    e.preventDefault();e.stopPropagation();drag=true;sx=e.clientX;sy=e.clientY;
    smx=parseFloat(el.style.left)/100;smy=parseFloat(el.style.top)/100;
    if(onStart)onStart();
    const img=document.getElementById('main-img');
    const mv=ev=>{if(!drag||!img)return;const r=img.getBoundingClientRect();const nx=Math.max(0,Math.min(1,smx+(ev.clientX-sx)/r.width));const ny=Math.max(0,Math.min(1,smy+(ev.clientY-sy)/r.height));el.style.left=(nx*100)+'%';el.style.top=(ny*100)+'%';onMove(nx,ny);};
    const up=()=>{drag=false;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  };
}
function highlightPin(id){document.querySelectorAll('.marker-pin').forEach(p=>p.classList.toggle('selected',p.dataset.id===id));}
function refreshTxt(tid){const sc=getSchema(S.editorId);if(!sc)return;const t=(sc.texts||[]).find(t=>t.id===tid);if(!t)return;const el=document.getElementById('txt-'+tid);if(!el)return;el.textContent=t.text;el.style.color=t.color;el.style.fontSize=t.fontSize+'px';}
function loadImage(file){compressImage(file).then(data=>{const sc=getSchema(S.editorId);if(!sc)return;sc.imageData=data;save();const si=storageInfo();if(si.pct>75)showToast('⚠️ Stockage à '+si.pct+'%','warn');else showToast('✅ Image chargée','success');render();});}

function submitFill(){
  const ex=S.ex;if(!ex||ex.submitted)return;
  let ok=0;
  ex.groups.forEach(g=>{if(isCorrect(ex.answers[g.groupId]||'',g)||(ex.manualCorrect&&ex.manualCorrect[g.groupId]))ok++;});
  ex.submitted=true;ex.score=Math.round(ok/ex.groups.length*100);render();
}
function markManualCorrect(groupId){
  const ex=S.ex;if(!ex)return;
  if(!ex.manualCorrect)ex.manualCorrect={};
  ex.manualCorrect[groupId]=true;
  // Recalculate score
  if(ex.submitted){
    let ok=0;
    ex.groups.forEach(g=>{if(isCorrect(ex.answers[g.groupId]||'',g)||ex.manualCorrect[g.groupId])ok++;});
    ex.score=Math.round(ok/ex.groups.length*100);
  }
  render();
}

function locateAnswer(clickedGroupId,skip){
  const ex=S.ex;const sc=getSchema(ex.schemaId);if(!sc)return;
  const label=ex.locateQueue[ex.locateIdx];if(!label){ex.locateDone=true;render();return;}
  // candidates = all groups whose label or aliases include this label
  const correctGroups=ex.groups.filter(g=>[g.label,...(g.aliases||[])].map(l=>l.trim()).includes(label));
  const correctGids=new Set(correctGroups.map(g=>g.groupId));
  const correct=!skip&&clickedGroupId!=null&&correctGids.has(clickedGroupId);
  const correctNums=correctGroups.map(g=>g.displayNum);
  ex.locateResults.push({label,correct,skipped:skip});
  if(!skip)ex.feedback={clickedGroupId,correct,correctNums};
  else ex.feedback=null;
  if(ex.feedbackTimeout)clearTimeout(ex.feedbackTimeout);
  ex.feedbackTimeout=setTimeout(()=>{
    ex.feedback=null;ex.locateIdx++;
    if(ex.locateIdx>=ex.locateQueue.length)ex.locateDone=true;
    render();
  },skip?0:1000);
  render();
}

          }
          return `<div class="marker-pin cppin" data-gid="${g.groupId}"
            style="left:${m.x*100}%;top:${m.y*100}%;border-color:${bc};color:${pinText(m.color)};background:rgba(6,16,30,.93);box-shadow:0 0 9px ${bc}99;cursor:pointer;${extra}transition:all .2s"
          >${g.displayNum}</div>`;
        }).join('')).join('')}
      </div>
    </div>
    <div class="locate-panel">
      <div style="font-weight:700;font-size:14px">🔢 Quel numéro ?</div>
      <div style="font-size:11px;color:var(--muted)">Cliquez sur le <b>numéro</b> correspondant à :</div>
      <div class="locate-target" style="font-size:22px">${cur.label}</div>
      ${cur.aliases&&cur.aliases.filter(a=>a.trim()).length?`<div style="font-size:11px;color:var(--muted);text-align:center">= ${cur.aliases.filter(a=>a.trim()).join(' / ')}</div>`:''}
      <div class="locate-pb"><div class="locate-fill" style="width:${pct}%"></div></div>
      <div class="locate-ptext">${ex.cpIdx} / ${ex.cpQueue.length}</div>
      ${ex.cpFeedback?`<div style="font-size:13px;font-weight:700;text-align:center;padding:8px;border-radius:8px;background:${ex.cpFeedback.correct?'rgba(0,224,154,.15)':'rgba(255,77,106,.15)'};color:${ex.cpFeedback.correct?'var(--success)':'var(--error)'}">${ex.cpFeedback.correct?'✓ Correct !':'✗ Raté — le bon était '+ex.cpFeedback.correctNum}</div>`:''}
      <div class="locate-history">${[...ex.cpResults].reverse().map(r=>`<div class="hist-item ${r.correct?'ok':'ko'}">${r.correct?'✓':'✗'} ${r.label}${r.skipped?' (passé)':''}</div>`).join('')}</div>
      <div class="panel-footer">
        <button class="btn btn-ghost w-full" id="btn-skip-cp">⏭ Passer</button>
        <button class="btn btn-ghost w-full" id="btn-back-cp">← Quitter</button>
      </div>
    </div>
  </div>
</div>`;

  const back=()=>{S.view='home';render();};
  document.getElementById('btn-back').onclick=back;
  document.getElementById('btn-back-cp').onclick=back;
  document.getElementById('btn-skip-cp').onclick=()=>clickPinAnswer(null,true);

  document.querySelectorAll('.cppin').forEach(pin=>{
    pin.onclick=e=>{e.stopPropagation();clickPinAnswer(pin.dataset.gid,false);};
  });
  setupExCanvas(sc,true);
}

function clickPinAnswer(clickedGroupId,skip){
  const ex=S.ex;const sc=getSchema(ex.schemaId);if(!sc)return;
  const cur=ex.cpQueue[ex.cpIdx];if(!cur){ex.cpDone=true;render();return;}
  const correct=!skip&&clickedGroupId===cur.groupId;
  const correctNum=cur.displayNum;
  ex.cpResults.push({label:cur.label,correct,skipped:skip});
  if(!skip)ex.cpFeedback={clickedGroupId,correct,correctNum};
  else ex.cpFeedback=null;
  if(ex.cpTimeout)clearTimeout(ex.cpTimeout);
  ex.cpTimeout=setTimeout(()=>{
    ex.cpFeedback=null;ex.cpIdx++;
    if(ex.cpIdx>=ex.cpQueue.length)ex.cpDone=true;
    render();
  },skip?0:1100);
  render();
}

function renderClickPinScore(app,sc,ex){
  const results=ex.cpResults,ok=results.filter(r=>r.correct).length,total=results.length;
  const pct=total>0?Math.round(ok/total*100):0;
  const color=pct>=80?'var(--success)':pct>=50?'var(--warn)':'var(--error)';
  app.innerHTML=`<div class="exercise-view">
  <div class="app-header"><button class="btn btn-ghost btn-sm" id="btn-back">← Quitter</button><div class="ex-title">🔢 <strong>${sc.title}</strong> – Résultats</div></div>
  <div class="score-view"><div class="score-card" style="border-color:${color}">
    <div style="font-size:50px;margin-bottom:7px">${pct>=80?'🎉':pct>=50?'💪':'📚'}</div>
    <div class="score-big" style="color:${color}">${pct}%</div>
    <div class="score-pct" style="color:${color}">${ok} / ${total}</div>
    <div class="score-msg">${pct>=80?'Excellent !':pct>=50?'Bien !':'Continuez !'}</div>
    <div class="score-det">${results.map(r=>`<div class="score-det-row ${r.correct?'ok':'ko'}">${r.correct?'✓':'✗'} ${r.label}${r.skipped?' <em style="opacity:.5">(passé)</em>':''}</div>`).join('')}</div>
    <div class="score-actions">
      <button class="btn btn-primary" id="btn-retry">🔄 Recommencer</button>
      <button class="btn btn-secondary" id="btn-home">← Bibliothèque</button>
    </div>
  </div></div>
</div>`;
  document.getElementById('btn-back').onclick=document.getElementById('btn-home').onclick=()=>{S.view='home';render();};
  document.getElementById('btn-retry').onclick=()=>startClickPin(ex.schemaId);
}

/* ══ FILE INPUTS ══ */
document.getElementById('img-upload').onchange=e=>{const f=e.target.files[0];if(f)loadImage(f);e.target.value='';};
document.getElementById('json-import').onchange=e=>{const f=e.target.files[0];if(f)importJSON(f);e.target.value='';};
window.addEventListener('resize',()=>{
  if(S.view==='editor'){redrawCanvas();}
  else{const sc=S.ex?getSchema(S.ex.schemaId):null;if(sc)drawAll(sc,document.getElementById('main-img'),document.getElementById('arrow-canvas'),true);}
});

/* ══ INIT ══ */
load();
render();
setTimeout(tryAutoLoad, 400);

</script>
